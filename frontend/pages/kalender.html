<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender Transaksi - UANGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/dashboard" class="navbar-brand">
        <span class="brand-icon">💰</span>
        <span class="brand-text">UANGIN</span>
      </a>
      <button class="navbar-toggle" id="navbarToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="navbar-menu" id="navbarMenu">
        <a href="/dashboard" class="navbar-item">
          <span class="item-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="/pendapatan" class="navbar-item income">
          <span class="item-icon">➕</span>
          <span>Pendapatan</span>
        </a>
        <a href="/pengeluaran" class="navbar-item expense">
          <span class="item-icon">➖</span>
          <span>Pengeluaran</span>
        </a>
        <a href="/laporan" class="navbar-item">
          <span class="item-icon">📈</span>
          <span>Laporan</span>
        </a>
        <a href="/kalender" class="navbar-item active">
          <span class="item-icon">📅</span>
          <span>Kalender</span>
        </a>
        <a href="/profil" class="navbar-item">
          <span class="item-icon">👤</span>
          <span>Profil</span>
        </a>
        <div class="navbar-divider"></div>
        <button class="navbar-item logout" id="logoutBtn">
          <span class="item-icon">🚪</span>
          <span>Logout</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="calendar-header">
      <div>
        <h1>📅 Kalender Transaksi</h1>
        <p>Lihat transaksi dalam tampilan kalender</p>
      </div>
      <div class="calendar-nav">
        <button class="btn btn-ghost" id="prevMonth">
          <span>◀</span> Sebelumnya
        </button>
        <h2 id="currentMonth"></h2>
        <button class="btn btn-ghost" id="nextMonth">
          Selanjutnya <span>▶</span>
        </button>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-container">
      <div class="calendar-grid" id="calendarGrid">
        <!-- Calendar will be generated here -->
      </div>
    </div>

    <!-- Transaction Details -->
    <div class="card transaction-details hidden" id="transactionDetails">
      <div class="card-header">
        <h3 id="selectedDate"></h3>
      </div>
      <div id="dayTransactions"></div>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/calendar.js"></script>
</body>
</html>
