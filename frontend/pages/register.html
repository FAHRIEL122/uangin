<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - UANGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container" style="max-width: 440px;">
    <div class="auth-brand-header">
      <div class="auth-brand-icon">💰</div>
      <h1 class="auth-brand-title">UANGIN</h1>
      <p class="auth-brand-subtitle">Buat Akun Baru</p>
    </div>
    <div class="auth-card">
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="fullName">Nama Lengkap <span class="required">*</span></label>
          <input type="text" id="fullName" class="form-input" placeholder="Nama lengkap" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Username <span class="required">*</span></label>
          <input type="text" id="username" class="form-input" placeholder="Min. 4 karakter" required minlength="4">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span class="required">*</span></label>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Min. 8 karakter" required minlength="8">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Konfirmasi Password <span class="required">*</span></label>
          <div class="password-input-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required>
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword')">👁️</button>
          </div>
        </div>
        <div id="registerError" class="alert alert-danger hidden">
          <span class="alert-icon">❌</span>
          <div><div class="alert-message" id="registerErrorMessage"></div></div>
        </div>
        <div id="registerSuccess" class="alert alert-success hidden">
          <span class="alert-icon">✅</span>
          <div><div class="alert-message" id="registerSuccessMessage"></div></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="registerBtn">Daftar</button>
      </form>
      <div class="auth-footer">
        Sudah punya akun? <a href="/login" class="auth-link">Masuk</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
