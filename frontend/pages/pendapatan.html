<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Pendapatan - UANGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/transaction.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/dashboard" class="navbar-brand">
        <span class="brand-icon">💰</span>
        <span class="brand-text">UANGIN</span>
      </a>
      <button class="navbar-toggle" id="navbarToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="navbar-menu" id="navbarMenu">
        <a href="/dashboard" class="navbar-item">
          <span class="item-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="/pendapatan" class="navbar-item active income">
          <span class="item-icon">➕</span>
          <span>Pendapatan</span>
        </a>
        <a href="/pengeluaran" class="navbar-item expense">
          <span class="item-icon">➖</span>
          <span>Pengeluaran</span>
        </a>
        <a href="/laporan" class="navbar-item">
          <span class="item-icon">📈</span>
          <span>Laporan</span>
        </a>
        <a href="/kalender" class="navbar-item">
          <span class="item-icon">📅</span>
          <span>Kalender</span>
        </a>
        <a href="/profil" class="navbar-item">
          <span class="item-icon">👤</span>
          <span>Profil</span>
        </a>
        <div class="navbar-divider"></div>
        <button class="navbar-item logout" id="logoutBtn">
          <span class="item-icon">🚪</span>
          <span>Logout</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="form-header">
      <div class="header-icon">💵</div>
      <h1>Tambah Pendapatan</h1>
      <p>Catat dan kelola pendapatan Anda dengan mudah</p>
    </div>

    <form id="incomeForm" class="transaction-form">
      <div class="form-group">
        <label for="amount" class="form-label">💰 Jumlah Pendapatan *</label>
        <input 
          type="text" 
          id="amount" 
          name="amount" 
          class="form-input" 
          placeholder="Contoh: 1.000.000"
          required
        >
        <div class="form-error" id="amountError"></div>
        <div class="amount-preview" id="amountPreview"></div>
      </div>

      <div class="form-group">
        <label for="category" class="form-label">📂 Kategori Pendapatan</label>
        <input 
          type="text" 
          id="category" 
          name="category" 
          class="form-input" 
          list="categoryList" 
          placeholder="Pilih atau ketik kategori"
          autocomplete="off"
        >
        <datalist id="categoryList">
          <!-- Populated by JS -->
        </datalist>
        <div class="form-error" id="categoryError"></div>
      </div>

      <div class="form-group">
        <label for="description" class="form-label">📝 Deskripsi <span class="text-muted">(opsional)</span></label>
        <textarea 
          id="description" 
          name="description" 
          class="form-textarea" 
          placeholder="Tambahkan deskripsi transaksi, contoh: Gaji bulan Januari"
          rows="3"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date" class="form-label">📅 Tanggal *</label>
          <input 
            type="date" 
            id="date" 
            name="date" 
            class="form-input" 
            required
          >
        </div>

        <div class="form-group">
          <label for="time" class="form-label">🕐 Waktu <span class="text-muted">(opsional)</span></label>
          <input 
            type="time" 
            id="time" 
            name="time" 
            class="form-input"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="recurring" name="recurring">
          <span>🔄 Transaksi berulang setiap bulan</span>
        </label>
      </div>

      <div class="form-group">
        <label for="attachment" class="form-label">📎 Lampiran <span class="text-muted">(opsional)</span></label>
        <input 
          type="file" 
          id="attachment" 
          name="attachment" 
          class="form-input" 
          accept="image/*,application/pdf"
        >
        <div class="form-help">Format: JPG, PNG, GIF, WebP, atau PDF. Maksimal 5MB</div>
        <div id="filePreview" class="file-preview hidden"></div>
      </div>

      <!-- Budget Warning -->
      <div id="budgetWarning" class="alert alert-warning hidden"></div>

      <div class="form-actions">
        <a href="/dashboard" class="btn btn-light">← Kembali</a>
        <button type="submit" class="btn btn-secondary btn-lg" id="submitBtn">
          💾 Simpan Pendapatan
        </button>
      </div>

      <div class="form-error" id="generalError"></div>
    </form>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/transaction-input.js"></script>
</body>
</html>
