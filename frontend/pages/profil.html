<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - UANGIN Buku Kas</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      margin: 0 auto 16px;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .profile-avatar img.visible {
      display: block;
    }

    .avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .help-text {
      display: block;
      margin-top: 6px;
      color: #6b7280;
      font-size: 0.85rem;
    }

    .profile-header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
    }

    .profile-header p {
      color: #6b7280;
      margin: 0;
    }

    .profile-section {
      margin-bottom: 24px;
    }

    .profile-section h3 {
      font-size: 14px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .profile-info {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      display: grid;
      gap: 12px;
    }

    .info-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .info-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .info-label {
      color: #6b7280;
      font-weight: 500;
      font-size: 13px;
    }

    .info-value {
      font-weight: 600;
      color: #1f2937;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    @media (max-width: 768px) {
      .profile-card {
        padding: 20px;
      }

      .profile-stats {
        grid-template-columns: 1fr;
      }

      .info-item {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .action-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Header -->
  <header>
    <div class="container">
      <h1 id="appLogo" aria-label="UANGIN">📊 UANGIN</h1>
      <div class="header-actions">
        <button class="nav-toggle" id="navToggle" aria-label="Buka menu">☰</button>
        <button class="nav-toggle" id="themeToggle" aria-label="Toggle tema">🌓</button>
      </div>
      <nav id="mainNav">
        <a href="/dashboard">Dashboard</a>
        <a href="/pendapatan">+ Pendapatan</a>
        <a href="/pengeluaran">- Pengeluaran</a>
        <a href="/laporan">Laporan</a>
        <a href="/kalender">Kalender</a>
        <a href="/profil" class="active">Profil</a>
        <a href="javascript:void(0)" onclick="logout()">Logout</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container profile-container" style="padding-top: 24px; padding-bottom: 32px;">
    <!-- Alert -->
    <div id="alertContainer"></div>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">
          <span class="avatar-fallback">👤</span>
          <img id="profileAvatarImg" alt="Foto Profil" />
        </div>
        <h1 id="userFullName">—</h1>
        <p id="userUsername">@username</p>
      </div>

      <!-- Stats -->
      <div class="profile-stats">
        <div class="stat-box">
          <div class="stat-number" id="totalTransactions">0</div>
          <div class="stat-label">Total Transaksi</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="totalIncome">Rp 0</div>
          <div class="stat-label">Total Pendapatan</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="totalExpense">Rp 0</div>
          <div class="stat-label">Total Pengeluaran</div>
        </div>
      </div>

      <!-- User Info -->
      <div class="profile-section">
        <h3>Informasi Akun</h3>
        <div class="profile-info">
          <div class="info-item">
            <div class="info-label">Username</div>
            <div class="info-value" id="infoUsername">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value" id="infoEmail">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Nama Lengkap</div>
            <div class="info-value" id="infoFullName">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Telepon</div>
            <div class="info-value" id="infoPhone">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Terdaftar Sejak</div>
            <div class="info-value" id="infoCreatedAt">—</div>
          </div>
        </div>
      </div>

      <!-- Edit Profile -->
      <div class="profile-section">
        <h3>Edit Profil</h3>
        <form id="editProfileForm">
          <div class="form-group">
            <label for="editFullName">Nama Lengkap</label>
            <input type="text" id="editFullName" placeholder="Nama Anda">
          </div>
          <div class="form-group">
            <label for="editPhone">Telepon</label>
            <input type="tel" id="editPhone" placeholder="+62 8xx xxx xxxx">
          </div>
          <div class="form-group">
            <label for="profilePhotoInput">Foto Profil</label>
            <input type="file" id="profilePhotoInput" accept="image/*">
            <small class="help-text">Pilih foto baru untuk profil Anda.</small>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Simpan Perubahan</button>
        </form>
      </div>

      <!-- Actions -->
      <div class="action-buttons">
        <button class="btn btn-light" onclick="downloadBackup()">💾 Download Backup</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </main>

  <script src="../js/utils.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
