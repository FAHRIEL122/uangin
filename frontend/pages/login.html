<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UANGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand-header">
      <div class="auth-brand-icon">💰</div>
      <h1 class="auth-brand-title">UANGIN</h1>
      <p class="auth-brand-subtitle">Kelola Keuangan Anda</p>
    </div>
    <div class="auth-card">
      <div class="auth-card-header">
        <h2 class="auth-title">Masuk</h2>
        <p class="auth-subtitle">Masukkan akun Anda untuk melanjutkan</p>
      </div>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="username">Username atau Email <span class="required">*</span></label>
          <input type="text" id="username" class="form-input" placeholder="Masukkan username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span class="required">*</span></label>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Masukkan password" required autocomplete="current-password">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" id="rememberMe">
            <span>Ingat saya</span>
          </label>
        </div>
        <div id="loginError" class="alert alert-danger hidden">
          <span class="alert-icon">❌</span>
          <div><div class="alert-message" id="loginErrorMessage"></div></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Masuk</button>
      </form>
      <div class="auth-footer">
        Belum punya akun? <a href="/register" class="auth-link">Daftar</a>
      </div>
    </div>
  </div>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
