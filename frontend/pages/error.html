<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - UANGIN</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/error.css">
</head>
<body>
  <div class="error-container">
    <div class="error-content">
      <div class="error-icon">😵</div>
      <h1 class="error-code" id="errorCode">404</h1>
      <h2 class="error-title" id="errorTitle">Halaman Tidak Ditemukan</h2>
      <p class="error-message" id="errorMessage">
        Maaf, halaman yang Anda cari tidak ditemukan atau telah dipindahkan.
      </p>
      <div class="error-actions">
        <a href="/dashboard" class="btn btn-primary btn-lg">Kembali ke Dashboard</a>
        <a href="/" class="btn btn-light btn-lg">Halaman Utama</a>
      </div>
    </div>
  </div>
  
  <script src="/js/error.js"></script>
</body>
</html>
